<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaiTap5</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="row">
        <div class="col-12 col-md-6 mx-auto">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="text-center mb-4">Thêm sách mới</h2>

              <form>
                <div class="mb-3">
                  <label for="book" class="form-label fw-bold">Tên sách</label>
                  <input
                    id="book"
                    type="text"
                    class="form-control form-control-lg"
                    placeholder="Nhập tên sách..."
                  />
                </div>

                <div class="mb-3">
                  <label for="author" class="form-label fw-bold">Tác giả</label>
                  <input
                    id="author"
                    type="text"
                    class="form-control form-control-lg"
                    placeholder="Nhập tên tác giả..."
                  />
                </div>

                <div class="mb-3">
                  <label for="genre" class="form-label fw-bold">Thể loại</label>
                  <select class="form-select form-select-lg" id="genre">
                    <option>Chọn thể loại...</option>
                    <option>Hài hước</option>
                    <option>Hành động</option>
                    <option>Khoa học</option>
                    <option>Tiểu thuyết</option>
                  </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100">
                  Thêm sách
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
