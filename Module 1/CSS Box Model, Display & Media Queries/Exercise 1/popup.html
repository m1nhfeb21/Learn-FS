<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaiTap5</title>
    <style>
        body{
            text-align: center;
            background: lightgray;
            font-family: Arial, Helvetica, sans-serif;
        }
        #dangky{
            background: white;
            width: 600px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            margin: 80px auto;
            box-sizing:border-box;
            padding: 35px 40px;
        }
        h2{
            color: rgb(255, 85, 0);
        }
        p{
            color: gray;
        }
        #email{
            border: 1px solid gray;
            border-radius: 4px;
            box-sizing: border-box;
            width: 320px;
            height: 40px;
            padding-left: 12px;
        }
        button{
            background: rgba(0, 98, 255, 0.782);
            color: white;
            border: none;
            width: 150px;
            border-radius: 4px;
            height: 40px;
            cursor: pointer;
            margin-left: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <section id="dangky">
        <h2 class ="tieude">Đăng ký nhận khuyến mãi!</h2>
        <p>Nhập email của bạn để không bỏ lỡ những deal "Siêu Sale Công Nghệ" mới nhất từ chúng tôi</p>
        <input id = "email" type="email" placeholder="Nhập địa chỉ email...">
        <button >Đăng ký ngay</button>
    </section>
</body>
</html>
