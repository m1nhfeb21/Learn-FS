<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaiTap3</title>
    <style>
        #cart{
            background: rgb(255, 183, 0);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid gray;
            vertical-align: middle;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            cursor: pointer;
        }

        #cart. icon{
            font-size: 24px;
            vertical-align: middle;
            margin-right: 10px;
        }
        #cart .text {
            vertical-align: middle;
        }

    </style>
</head>
<body>
    <button id="cart" type="button">
        <span class="icon">🛒</span>
        <span class="text">Thêm vào giỏ hàng</span>
    </button>
</body>
</html>
