<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaiTap4</title>
    <style>
        .sanpham {
            display: inline-block;
            width: 150px;
            height: 150px;
            line-height: 150px;
            margin: 0 10px;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            text-align: center;
            vertical-align: middle;
        }
        #none{
            background: lightgray;
            padding: 40px;
            font-family: Arial, Helvetica, sans-serif;
        }

        #none .sanpham:nth-child(1){
            background: rgb(8, 238, 8);
            color: white;
            padding: 60px 30px;
            border-radius: 6px;
            font-weight: 700;
        }
        #none .sanpham:nth-child(2){
            background: rgb(238, 234, 8);
            color: white;
            padding: 60px 30px;
            border-radius: 6px;
            font-weight: 700;
            display: none;
        }
        #none .sanpham:nth-child(3){
            background: rgb(207, 8, 238);
            color: white;
            padding: 60px 30px;
            border-radius: 6px;
            font-weight: 700;
        }

        #hidden{
            background: lightgray;
            padding: 40px;
            font-family: Arial, Helvetica, sans-serif;
        }
        #hidden .sanpham:nth-child(1){
            background: rgb(8, 238, 8);
            color: white;
            padding: 60px 30px;
            border-radius: 6px;
            font-weight: 700;
        }

        #hidden .sanpham:nth-child(2){
            background: rgb(238, 234, 8);
            color: white;
            padding: 60px 30px;
            border-radius: 6px;
            font-weight: 700;
            visibility: hidden;
        }

        #hidden .sanpham:nth-child(3){
            background: rgb(207, 8, 238);
            color: white;
            padding: 60px 30px;
            border-radius: 6px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="none">
        <span class="sanpham">
            Sản phẩm 1
        </span>
        <span class="sanpham">Sản phẩm 2</span>
        <span class="sanpham">Sản phẩm 3</span>
    </div>  
    <hr>
    <div id="hidden">
        <span class="sanpham">
            Sản phẩm 4
        </span>
        <span class="sanpham">
            Sản phẩm 5
        </span>
        <span class="sanpham">Sản phẩm 6</span>
    </div>
</body>
</html>
