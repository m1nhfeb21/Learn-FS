<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaiTap3</title>
    <style>
        #hero{
            background:
                linear-gradient(rgba(0,0,0,0.45), rgba(0, 0, 0, 0.45)),

        .banner{
            color: white;

        }

        .thongtin{

            font-size: 15px;
        }

    <section id="hero">
        <h2 class="banner">Khám Phá Vẻ Đẹp Thiên Nhiên</h2>
        <p class="thongtin">Đắm mình vào những cảnh quan hùng vĩ, tận hưởng
            không khí trong lành và tạo nên những kỷ niệm khó 
            quên tại những điểm đến tuyệt vời nhất.
        </p>
    </section>
</body>
</html>
