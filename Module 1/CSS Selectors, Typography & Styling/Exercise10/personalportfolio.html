<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaiTap10</title>
    <style>
        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #portfolio{
            list-style-type: none;
            text-align: center;
            margin: 20px;
            line-height: 40px;
            padding: 20px;
            background: linear-gradient(rgba(30, 45, 60, 0.85), rgba(30, 45, 60, 0.85)), url("portfolito.jpg") no-repeat center/cover;
        }
        .banner:nth-child(1){
            font-size: 35px;
            color: white;
            font-weight: 700;
            padding: 25px;
        }
        #portfolio hr{
            border:1px solid aquamarine;
            width: 200px;
        }
        .banner:nth-child(2){
            font-size:20px;
            color: rgb(202, 200, 200);
        }

        .banner:nth-child(3){
            font-size:15px;
            color: rgb(223, 220, 220);
        }
        .banner:nth-child(4){
            color:aquamarine;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 6px;
        }
        button{
            border: 1px solid aquamarine;
            color: aquamarine;
            background: none;
            width: 80px;
            height: 40px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover{
            font-weight: 500;
            font-size: 16px;
            color: green;
            border: none;
            background: aquamarine;
        }
    </style>
</head>
<body>
    <ul id="portfolio">
        <li class="banner">Nguyễn Ngọc Minh
        <hr>
        </li>

        <li class="banner">Frontend Developer</li>
        <li class="banner">Thiết kế trải nghiệm người dùng, sáng tạo giao diện độc đáo, tối ưu hóa tương tác.</li>
        <li class="banner">SÁNG TẠO ĐỂ DẪN ĐẦU</li>
        <button>Tải CV</button>
    </ul>
</body>
</html>
