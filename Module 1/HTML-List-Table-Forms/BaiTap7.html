<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaiTap7</title>
</head>
<style>
    body{
        text-align:center;
    }
    table{
        margin: 0 auto;
        border-collapse: collapse;
    }
    th,td{
        border:1px solid black;
        padding:12px 20px;
        font-size:20px;
    }
</style>
<body>
    <header>
        <h1>Báo cáo tài chính năm</h1>
    </header>

    <main>
        <table> 
            <caption>Báo cáo doanh thu và lợi nhuận các quý trong năm</caption>
            <thead>
                <tr>
                    <th>Chỉ tiêu</th>
                    <th>Quý 1</th>
                    <th>Quý 2</th>
                    <th>Quý 3</th>
                    <th>Quý 4</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th>Doanh thu(Tỷ VNĐ)</th>
                    <td>500</td>
                    <td>650</td>
                    <td>700</td>
                    <td>850</td>
                </tr>

                <tr>
                    <th>Lợi nhuận(Tỷ VNĐ)</th>
                    <td>120</td>
                    <td>180</td>
                    <td>210</td>
                    <td>250</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
