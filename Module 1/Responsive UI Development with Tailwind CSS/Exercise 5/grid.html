<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaiTap5</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100">
    <section class="max-w-5xl mx-auto mt-10 bg-gray p-8">
      <h2 class="text-2xl font-bold text-center mb-6">Các Tour Nổi Bật</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white rounded-lg shadow-md overflow-hidden text-center hover:bg-gray-50">
            <img  src="https://images.unsplash.com/photo-1563492065599-3520f775eeed"
            alt="Thái Lan"
            class="w-full h-40 object-cover">
            <div class="p-4">
                <h3 class="font-bold">Thái Lan</h3>
                <p class="text-gray-500 text-sm">Xứ sở chùa vàng</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden text-center hover:bg-gray-50">
            <img src="https://images.unsplash.com/photo-1542051841857-5f90071e7989"
            alt="Nhật Bản"
            class="w-full h-40 object-cover">
            <div class="p-4">
                <h3 class="font-bold">Nhật Bản</h3>
                <p class="text-gray-500 text-sm">Hoa anh đào rực rỡ</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden text-center hover:bg-gray-50">
            <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34"
            alt="Pháp"
            class="w-full h-40 object-cover"
          />
          <div class="p-4">
            <h3 class="font-bold">Pháp</h3>
            <p class="text-gray-500 text-sm">Kinh đô ánh sáng</p>
          </div>
      </div>
    </section>
  </body>
</html>
