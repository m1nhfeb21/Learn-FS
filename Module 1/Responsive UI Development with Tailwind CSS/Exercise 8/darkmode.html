<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaiTap8</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>
  </head>
  <body class="bg-gray-100 dark:bg-gray-900 min-h-screen">
    <section class="min-h-screen flex items-center justify-center relative p-6">
      <div
        class="w-72 bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6 text-center"
      >
        <h3 class="font-bold text-gray-900 dark:text-white mb-2 text-xl">
          Tour Đà Lạt
        </h3>
        <p class="text-sm text-gray-500 dark:text-gray-300 mb-5">
          3 Ngày 2 Đêm
        </p>
        <p class="text-sm text-gray-700 dark:text-gray-300">
          <span class="font-bold text-3xl text-blue-600">2.500.000đ</span>/khách
        </p>
        <div class="text-left space-y-3 mb-6">
          <p class="text-sm dark:text-white text-gray-700">
            Khách sạn 4 sao trung tâm
          </p>
          <p class="text-sm dark:text-white text-gray-700">
            Xe Limousine đưa đón tận nơi
          </p>
          <p class="text-sm dark:text-white text-gray-700">
            Vé tham quan tất cả các điểm
          </p>
        </div>

        <button
          onclick="document.documentElement.classList.toggle('dark')"
          class="absolute bottom-6 right-6 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white text-sm font-bold px-4 py-2 rounded-full shadow-md"
        >
          ĐẶT TOUR NGAY
        </button>
      </div>
    </section>
  </body>
</html>
