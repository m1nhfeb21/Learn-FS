<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BaiTap6</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-200">
    <form
      class="max-w-5xl mx-auto mt-10 bg-white p-6 rounded-lg shadow-md border border-gray-200"
    >
      <div class="mt-5 grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
        <div class="p-5">
          <label for="destination" class="block font-bold mb-2">Điểm đến</label>
          <input
            id="destination"
            type="text"
            class="w-full border border-gray-300 rounded-md p-3 outline-none focus:border-blue-500"
            placeholder="Bạn muốn đi đâu?"
          />
        </div>

        <div class="p-5">
          <label for="date" class="block font-bold mb-2">Ngày đi</label>
          <input
            id="date"
            class="w-full border border-gray-300 rounded-md p-3 outline-none focus:border-blue-500"
            type="date"
          />
        </div>

        <div class="p-5">
          <button
            type="submit"
            class="w-full bg-blue-600 text-white font-bold rounded-md p-3 hover:bg-blue-700"
          >
            Tìm kiếm
          </button>
        </div>
      </div>
    </form>
  </body>
</html>
